<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicFix 後台驗證</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f5f7fb; font-family:"Segoe UI","Noto Sans TC",Arial,sans-serif; color:#111827; }
    .card { width:min(520px,calc(100vw - 32px)); background:#fff; border:1px solid #e5e7eb; border-radius:20px; padding:28px; box-shadow:0 10px 28px rgba(15,23,42,.08); }
    h1 { margin:0 0 8px; font-size:26px; }
    p { color:#6b7280; line-height:1.6; }
    label { display:block; margin:18px 0 8px; font-weight:700; }
    input { width:100%; min-height:44px; border:1px solid #e5e7eb; border-radius:12px; padding:10px 12px; font:inherit; }
    button { margin-top:16px; width:100%; min-height:44px; border:0; border-radius:12px; background:#0f172a; color:white; font:inherit; cursor:pointer; }
    .danger { color:#b91c1c; }
    .mini { font-size:13px; color:#6b7280; }
  </style>
</head>
<body>
  <main class="card">
    <h1>CivicFix 後台驗證</h1>
    {% if message %}<p class="danger">{{ message }}</p>{% endif %}
    <p>輸入 Render Environment 裡的 <b>ADMIN_TOKEN</b>。通過後會使用 HttpOnly cookie，不會把密碼一直塞在網址列。</p>
    <form method="post" action="/dashboard/civicfix/login">
      <input type="hidden" name="next_path" value="{{ next_path }}">
      <label for="token">ADMIN_TOKEN</label>
      <input id="token" name="token" type="password" autocomplete="current-password" autofocus>
      <button type="submit">登入 CivicFix</button>
    </form>
    <p class="mini">如果登入後仍回到此頁，代表 ADMIN_TOKEN 打錯或 Render 尚未設定。</p>
  </main>
</body>
</html>
