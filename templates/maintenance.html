<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Maintenance Dashboard</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--primary:#111827;--soft:#eef2ff;--indigo:#3730a3;--shadow:0 4px 16px rgba(0,0,0,.06);--radius:18px}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1500px;margin:0 auto;padding:24px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px}
    h1{margin:0 0 6px;font-size:32px}.subtitle{margin:0;color:var(--muted);line-height:1.6}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn,.input{height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;padding:0 14px;font-size:14px;color:var(--text)}
    .btn{cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:20px}.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;min-height:128px}.card h3{margin:0 0 14px;color:var(--muted);font-size:14px}.num{font-size:32px;font-weight:800;line-height:1.1}.sub{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.5}
    .section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:20px}.section h2{margin:0 0 14px;font-size:20px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tab{border:none;border-radius:999px;padding:10px 14px;background:#f3f4f6;cursor:pointer}.tab.active{background:var(--primary);color:#fff}
    table{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed}th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-weight:700}.mono{font-variant-numeric:tabular-nums}.pill{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;margin:2px}.status-approved{background:#ecfdf5;color:#047857}.status-pending{background:#fffbeb;color:#92400e}.status-rejected{background:#fef2f2;color:#991b1b}.flags{line-height:1.8}.reason{color:#374151;line-height:1.5}.small{font-size:12px;color:var(--muted)}.empty{color:var(--muted);padding:16px;background:#f9fafb;border-radius:12px}.bar{height:9px;background:#eef2ff;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:#6366f1;border-radius:999px}
    @media(max-width:1000px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))} table{table-layout:auto;min-width:900px}.table-scroll{overflow-x:auto}}@media(max-width:640px){.grid{grid-template-columns:1fr}.container{padding:16px}h1{font-size:26px}}
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div><h1>自動資料維護儀表板</h1><p class="subtitle">集中查看使用者新增廁所的自動驗證結果、待審資料、疑似重複與高風險標籤。</p></div>
    <div class="actions"><a class="btn" href="/dashboard">← 回總覽儀表板</a><a class="btn" href="/dashboard/nts">NTS 排序分析 →</a><input id="tokenInput" class="input" placeholder="ADMIN_TOKEN" type="password"><button class="btn primary" id="loadBtn">載入資料</button></div>
  </div>
  <div class="grid" id="summaryGrid"></div>
  <div class="section"><h2>風險標籤統計</h2><div id="flagList"></div></div>
  <div class="section"><h2>維護佇列</h2><div class="tabs" id="tabs"></div><div class="table-scroll"><table><thead><tr><th style="width:70px">ID</th><th style="width:180px">名稱</th><th style="width:90px">狀態</th><th style="width:90px">分數</th><th style="width:220px">風險標籤</th><th>原因</th><th style="width:110px">疑似重複</th></tr></thead><tbody id="queueBody"></tbody></table></div></div>
</div>
<script>
const queueLabels={pending:'待人工確認',possible_duplicate:'疑似重複',shop_access_unclear:'店家開放不明',generic_name:'名稱太籠統',outside_primary_region:'主要區域外',rejected:'建議排除',low_score:'低分資料'};
let DATA=null, activeQueue='pending';
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function fmt(n){return Number(n||0).toLocaleString('zh-TW')}
function statusPill(s){const c=s==='approved'?'status-approved':s==='rejected'?'status-rejected':'status-pending';return `<span class="pill ${c}">${esc(s||'unknown')}</span>`}
function renderSummary(){const s=DATA.summary||{};const cards=[['總資料數',s.total,'本次掃描筆數'],['Approved',s.approved,'低風險或已通過'],['Pending',s.pending,`待確認率 ${s.pending_rate||0}%`],['Rejected',s.rejected,'建議排除'],['平均驗證分數',s.avg_auto_score,'Auto Verification 1.1']];summaryGrid.innerHTML=cards.map(x=>`<div class="card"><h3>${x[0]}</h3><div class="num mono">${fmt(x[1])}</div><div class="sub">${x[2]}</div></div>`).join('')}
function renderFlags(){const flags=DATA.flag_counts||[]; if(!flags.length){flagList.innerHTML='<div class="empty">目前沒有風險標籤。</div>';return;} const max=Math.max(...flags.map(x=>x.count||0),1); flagList.innerHTML=flags.slice(0,20).map(x=>`<div style="display:grid;grid-template-columns:220px 70px 1fr;gap:12px;align-items:center;margin:10px 0"><strong>${esc(x.flag)}</strong><span class="mono">${fmt(x.count)}</span><div class="bar"><span style="width:${Math.round((x.count||0)/max*100)}%"></span></div></div>`).join('')}
function renderTabs(){const q=DATA.queues||{};tabs.innerHTML=Object.keys(queueLabels).map(k=>`<button class="tab ${k===activeQueue?'active':''}" data-key="${k}">${queueLabels[k]} (${(q[k]||[]).length})</button>`).join('');tabs.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeQueue=b.dataset.key;renderTabs();renderQueue();});}
function renderQueue(){const rows=((DATA.queues||{})[activeQueue]||[]); if(!rows.length){queueBody.innerHTML=`<tr><td colspan="7"><div class="empty">這個佇列目前沒有資料。</div></td></tr>`;return;} queueBody.innerHTML=rows.map(r=>`<tr><td class="mono">${esc(r.id)}</td><td><strong>${esc(r.name)}</strong><div class="small">${esc(r.address||'')}</div></td><td>${statusPill(r.status)}</td><td class="mono">${esc(r.score??0)}</td><td class="flags">${(r.risk_flags||[]).map(f=>`<span class="pill">${esc(f)}</span>`).join('')||'<span class="small">無</span>'}</td><td class="reason">${esc(r.reason)}</td><td class="mono">${fmt(r.similar_count||0)}</td></tr>`).join('')}
async function loadData(){const token=(tokenInput.value||localStorage.getItem('maintenance_token')||'').trim(); if(token){localStorage.setItem('maintenance_token',token); tokenInput.value=token;} summaryGrid.innerHTML='<div class="card"><h3>載入中</h3><div class="sub">正在讀取維護資料...</div></div>'; const res=await fetch(`/api/maintenance-summary?limit=1000&token=${encodeURIComponent(token)}`); const data=await res.json(); if(!res.ok||!data.ok){summaryGrid.innerHTML=`<div class="card"><h3>載入失敗</h3><div class="sub">${esc(data.message||res.status)}</div></div>`;return;} DATA=data; renderSummary(); renderFlags(); renderTabs(); renderQueue();}
loadBtn.onclick=loadData; window.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('maintenance_token')||''; if(t){tokenInput.value=t; loadData();}});
</script>
</body>
</html>
